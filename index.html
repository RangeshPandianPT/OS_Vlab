    <title>OS_VLab - Operating System Virtual Laboratory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'bkg-light': '#f8fafc',
              'bkg-dark': '#050505',
              'card-light': 'rgba(255, 255, 255, 0.7)',
              'card-dark': 'rgba(15, 15, 20, 0.65)',
              'border-light': 'rgba(209, 213, 219, 0.4)',
              'border-dark': 'rgba(255, 255, 255, 0.08)',
              'text-light': '#0f172a',
              'text-dark': '#f1f5f9',
              'text-muted-light': '#64748b',
              'text-muted-dark': '#94a3b8',
              'accent': '#8b5cf6', // Violet
              'accent-hover': '#7c3aed',
              'neon-blue': '#3b82f6',
              'neon-cyan': '#06b6d4',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            backdropBlur: {
              xl: '24px',
              '2xl': '40px',
            },
            animation: {
              'grid-pan': 'gridPan 20s linear infinite',
              'glow-pulse': 'glowPulse 3s ease-in-out infinite alternate',
            },
            keyframes: {
              gridPan: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(100px)' },
              },
              glowPulse: {
                '0%': { opacity: '0.8', filter: 'blur(8px)' },
                '100%': { opacity: '1', filter: 'blur(12px)' },
              }
            }
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
